<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- monochrome; GTK recolors the fill. Same compass metaphor as the full-color icon. -->
  <g fill="#2e3436">
    <!-- ring -->
    <path fill-rule="evenodd" d="M8 0.75a7.25 7.25 0 1 0 0.001 0zM8 2.35a5.65 5.65 0 1 1-0.001 0z"/>
    <!-- N-S needle (solid) -->
    <path d="M8 3.1 6.5 8 8 12.9 9.5 8Z"/>
    <!-- E-W needle (secondary, lighter) -->
    <path opacity="0.5" d="M3.1 8 8 6.5 12.9 8 8 9.5Z"/>
    <!-- hub -->
    <circle cx="8" cy="8" r="1.3"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- GNOME standard palette blues (Blue 2 -> Blue 4) -->
    <linearGradient id="face" x1="64" y1="16" x2="64" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="1" stop-color="#2f77dd"/>
    </linearGradient>
  </defs>

  <!-- saturated dark-blue outline around the whole silhouette (GNOME edge definition) -->
  <rect x="18.5" y="14.5" width="91" height="99" rx="15.5" fill="#174a90"/>
  <!-- front profile (the ~4px "thickness" of the plate, darker; per GNOME "top and front") -->
  <rect x="20" y="16" width="88" height="96" rx="14" fill="#1a5fb4"/>
  <!-- front face -->
  <rect x="20" y="16" width="88" height="92" rx="14" fill="url(#face)"/>

  <!-- compass rose, axis-aligned so it reads as a navigation instrument (not a browser needle) -->
  <g transform="translate(64 62)">
    <!-- secondary points (NE, SE, SW, NW), drawn first so the primaries sit on top -->
    <g fill="#c3d4ef">
      <g transform="rotate(45)"><path d="M0 -21 L6.5 0 L0 0 Z"/></g>
      <g transform="rotate(135)"><path d="M0 -21 L6.5 0 L0 0 Z"/></g>
      <g transform="rotate(225)"><path d="M0 -21 L6.5 0 L0 0 Z"/></g>
      <g transform="rotate(315)"><path d="M0 -21 L6.5 0 L0 0 Z"/></g>
    </g>
    <g fill="#ffffff">
      <g transform="rotate(45)"><path d="M0 -21 L-6.5 0 L0 0 Z"/></g>
      <g transform="rotate(135)"><path d="M0 -21 L-6.5 0 L0 0 Z"/></g>
      <g transform="rotate(225)"><path d="M0 -21 L-6.5 0 L0 0 Z"/></g>
      <g transform="rotate(315)"><path d="M0 -21 L-6.5 0 L0 0 Z"/></g>
    </g>

    <!-- primary points (N, E, S, W): shadow half then light half give the classic dimensional look -->
    <g fill="#c3d4ef">
      <g transform="rotate(0)"><path d="M0 -37 L9 0 L0 0 Z"/></g>
      <g transform="rotate(90)"><path d="M0 -37 L9 0 L0 0 Z"/></g>
      <g transform="rotate(180)"><path d="M0 -37 L9 0 L0 0 Z"/></g>
      <g transform="rotate(270)"><path d="M0 -37 L9 0 L0 0 Z"/></g>
    </g>
    <g fill="#ffffff">
      <g transform="rotate(0)"><path d="M0 -37 L-9 0 L0 0 Z"/></g>
      <g transform="rotate(90)"><path d="M0 -37 L-9 0 L0 0 Z"/></g>
      <g transform="rotate(180)"><path d="M0 -37 L-9 0 L0 0 Z"/></g>
      <g transform="rotate(270)"><path d="M0 -37 L-9 0 L0 0 Z"/></g>
    </g>

    <!-- hub -->
    <circle r="6.5" fill="#ffffff"/>
    <circle r="3.2" fill="#1c71d8"/>
    <circle r="1.1" fill="#ffffff"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="back" x1="0" y1="32" x2="0" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a5fb4"/>
      <stop offset="1" stop-color="#153b73"/>
    </linearGradient>
    <linearGradient id="front" x1="0" y1="58" x2="0" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="0.5" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1c71d8"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="40" x2="0" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8e6e3"/>
    </linearGradient>
  </defs>

  <!-- soft drop shadow -->
  <path d="M22 34 a8 8 0 0 1 8-8 h24 a4 4 0 0 1 3 1.4 l6.4 7 a4 4 0 0 0 3 1.6 h48 a8 8 0 0 1 8 8 v52 a8 8 0 0 1 -8 8 H22 a8 8 0 0 1 -8 -8 V42 a8 8 0 0 1 8 -8 Z"
        fill="#000000" opacity="0.14" transform="translate(0,3)"/>

  <!-- folder back panel + tab -->
  <path d="M22 34 a8 8 0 0 1 8-8 h24 a4 4 0 0 1 3 1.4 l6.4 7 a4 4 0 0 0 3 1.6 h48 a8 8 0 0 1 8 8 v52 a8 8 0 0 1 -8 8 H22 a8 8 0 0 1 -8 -8 V42 a8 8 0 0 1 8 -8 Z"
        fill="url(#back)"/>

  <!-- documents peeking out -->
  <rect x="34" y="42" width="60" height="52" rx="4" fill="url(#paper)" opacity="0.95"/>
  <rect x="30" y="46" width="68" height="50" rx="4" fill="url(#paper)"/>

  <!-- folder front flap -->
  <path d="M14 62 h100 v40 a8 8 0 0 1 -8 8 H22 a8 8 0 0 1 -8 -8 Z" fill="url(#front)"/>
  <path d="M14 62 h100 v3 H14 Z" fill="#ffffff" opacity="0.18"/>

  <!-- compass rose: the nautical nod -->
  <g transform="translate(64,86)" fill="#ffffff">
    <circle r="19" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.55"/>
    <path d="M0 -17 L4.5 -4.5 L0 0 L-4.5 -4.5 Z" opacity="0.95"/>
    <path d="M0 17 L4.5 4.5 L0 0 L-4.5 4.5 Z" opacity="0.6"/>
    <path d="M-17 0 L-4.5 -4.5 L0 0 L-4.5 4.5 Z" opacity="0.6"/>
    <path d="M17 0 L4.5 -4.5 L0 0 L4.5 4.5 Z" opacity="0.75"/>
    <circle r="2.4" opacity="0.95"/>
  </g>
</svg>
